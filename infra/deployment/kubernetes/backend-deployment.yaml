apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-backend
  labels:
    app: nova-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nova-backend
  template:
    metadata:
      labels:
        app: nova-backend
    spec:
      containers:
        - name: backend
          image: your-registry/nova-backend:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: nova-backend-secrets
            - configMapRef:
                name: nova-backend-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
