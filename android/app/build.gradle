apply plugin: "com.android.application"

import com.android.build.OutputFile

android {
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.nova"   // Cambia al ID de tu app
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"

        multiDexEnabled true
    }

    signingConfigs {
        release {
            storeFile file(MYAPP_UPLOAD_STORE_FILE)
            storePassword MYAPP_UPLOAD_STORE_PASSWORD
            keyAlias MYAPP_UPLOAD_KEY_ALIAS
            keyPassword MYAPP_UPLOAD_KEY_PASSWORD
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            zipAlignEnabled true
            debuggable false

            // ProGuard para ofuscación y optimización
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            minifyEnabled false
            shrinkResources false
            debuggable true
        }
    }

    // Opcional: soporte multidex si tu app tiene muchas dependencias
    dexOptions {
        javaMaxHeapSize "4g"
    }

    packagingOptions {
        resources {
            excludes += ["META-INF/LICENSE*", "META-INF/NOTICE*", "META-INF/*.kotlin_module"]
        }
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "com.facebook.react:react-android:+"
    implementation "androidx.multidex:multidex:2.0.1"

    // Dependencias adicionales según tu proyecto
}
